server {
    listen 80;

    # /api/ goes to the backend container over the internal Docker
    # network — this is what removes the need to ever publish port 3500
    # or know the ALB/instance address at build time.
    location /api/ {
        proxy_pass http://backend:3500/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Everything else is the React app. try_files falls back to
    # index.html so React Router's client-side routes (/student, /teacher)
    # work on a hard refresh, not just in-app navigation.
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
