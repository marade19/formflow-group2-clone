services:
  frontend:
    container_name: formflow-frontend
    build:
      context: ./frontend
      args:
        REACT_APP_API_BASE_URL: ${REACT_APP_API_BASE_URL:-http://localhost:3500}
        APP_VERSION: ${TAG:-dev}
    image: ${DOCKERHUB_USER:-formflow}/formflow-frontend:${TAG:-latest}
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - formflow-net
    restart: unless-stopped

  backend:
    container_name: formflow-backend
    build:
      context: ./backend
      args:
        APP_VERSION: ${TAG:-dev}
    image: ${DOCKERHUB_USER:-formflow}/formflow-backend:${TAG:-latest}
    ports:
      - "3500:3500"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - formflow-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3500/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  db:
    container_name: formflow-db
    image: mysql:8.0
    env_file:
      - .env
    environment:
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - formflow-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

volumes:
  mysql-data:

networks:
  formflow-net:
    name: formflow-net
    driver: bridge
